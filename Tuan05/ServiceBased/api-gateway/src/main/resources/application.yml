server:
  port: 8080

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: order-service
            uri: http://localhost:3001
            predicates:
              - Path=/api/orders/**

          - id: payment-service
            uri: http://localhost:3002
            predicates:
              - Path=/api/payments/**

          - id: shipping-service
            uri: http://localhost:3003
            predicates:
              - Path=/api/shippings/**