<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        .icon { font-size: 60px; margin-bottom: 20px; }

        h2 { color: #1a1a2e; font-size: 26px; margin-bottom: 10px; }

        .welcome {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .username {
            color: #4361ee;
            font-weight: 700;
        }

        .btn-logout {
            display: inline-block;
            padding: 12px 30px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-logout:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎉</div>
        <h2>Đăng Nhập Thành Công!</h2>
        <p class="welcome">
            Xin chào, <span class="username" sec:authentication="name">User</span>!<br>
            Chào mừng đến với Dashboard.
        </p>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">🚪 Đăng Xuất</button>
        </form>
    </div>
</body>
</html>
